# Alembic configuration for AI Gita Mentor.
# The database URL is injected from the environment in migrations/env.py
# (DATABASE_URL), so it is intentionally left blank here.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a stable, sortable revision prefix (we hand-author the first migration).
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
